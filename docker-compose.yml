services:
  mongodb:
    image: mongo:7
    container_name: multilingual-chat-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: multilingual-chat-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  libretranslate:
    image: libretranslate/libretranslate:latest
    container_name: multilingual-chat-libretranslate
    restart: unless-stopped
    ports:
      - "5000:5000"
    command:
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "5000"
      - "--load-only"
      - "en,hi,es,fr,de,it,pt,ru,ar,nl"
    volumes:
      - libretranslate_models:/home/libretranslate/.local

volumes:
  mongodb_data:
  libretranslate_models:
